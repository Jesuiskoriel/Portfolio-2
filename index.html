    function parseUnixDate(value) {
      if (!value) return null;
      const ms = Date.parse(value);
      if (!Number.isFinite(ms)) return null;
      const sec = Math.floor(ms / 1000);
      return sec > 0 ? sec : null;
    }
    function isCleanTitle(title) {
      if (!title) return false;
      return !title.includes("ï¿½");
    }
    async function fetchFromRssSources(rssSources, idPrefix) {
      const parseFromRss2Json = (json, sourceName) => {
        const items = (json?.items || []).slice(0, 8);
        return items.map((item, idx) => {
          const title = item?.title?.trim();
          const link = item?.link?.trim();
          const date = parseUnixDate(item?.pubDate);
          if (!isCleanTitle(title) || !link) return null;
          return { id: sourceName + "-" + idPrefix + "-r2j-" + idx + "-" + title, title, url: link, date, source: sourceName };
        }).filter(Boolean);
      };
      const parseItems = (xmlText, sourceName) => {
        const parser = new DOMParser();
        const xml = parser.parseFromString(xmlText, "application/xml");
        const items = Array.from(xml.querySelectorAll("item")).slice(0, 8);
        return items.map((item, idx) => {
          const title = item.querySelector("title")?.textContent?.trim();
          const link = item.querySelector("link")?.textContent?.trim();
          const dateRaw = item.querySelector("pubDate")?.textContent?.trim();
          const date = parseUnixDate(dateRaw);
          if (!isCleanTitle(title) || !link) return null;
          return { id: sourceName + "-" + idPrefix + "-" + idx + "-" + title, title, url: link, date, source: sourceName };
        }).filter(Boolean);
      };
      const responses = await Promise.all(rssSources.map(async (src) => {
        try {
          const rss2jsonUrl = "https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(src.url);
          const rssJson = await fetch(rss2jsonUrl).then((r) => r.json()).catch(() => null);
          const parsedR2J = parseFromRss2Json(rssJson, src.source);
          if (parsedR2J.length) return parsedR2J;
          const proxyUrl = "https://api.allorigins.win/raw?url=" + encodeURIComponent(src.url);
          const xml = await fetch(proxyUrl).then((r) => r.text());
          return parseItems(xml, src.source);
        } catch (e) { return []; }
      }));
      return responses.flat().filter((item) => item && item.date).sort((a, b) => b.date - a.date).slice(0, 10);
    }

    async function fetchTechWatchFallback() {
      const queries = ["software", "artificial intelligence", "cybersecurity", "cloud", "hardware", "open source"];
      const responses = await Promise.all(queries.map((q) =>
        fetch("https://hn.algolia.com/api/v1/search_by_date?tags=story&query=" + encodeURIComponent(q))
          .then((r) => r.json()).catch(() => ({ hits: [] }))
      ));
      const map = new Map();
      responses.forEach((res) => {
        (res.hits || []).forEach((hit) => {
          if (!hit || !hit.title) return;
          const id = String(hit.objectID || hit.story_id || hit.created_at_i || hit.title);
          if (map.has(id)) return;
          map.set(id, { id, title: hit.title, url: hit.url || ("https://news.ycombinator.com/item?id=" + hit.objectID), date: hit.created_at_i || null, source: "Hacker News" });
        });
      });
      return Array.from(map.values()).filter((item) => item.date).sort((a, b) => b.date - a.date).slice(0, 10);
    }

    function useReveal() {
      const refs = useRef([]);
      useEffect(() => {
        const observer = new IntersectionObserver((entries) => {
          entries.forEach((entry) => { if (entry.isIntersecting) entry.target.classList.add("visible"); });
        }, { threshold: 0.15 });
        refs.current.forEach((node) => node && observer.observe(node));
        return () => observer.disconnect();
      }, []);
      return refs;
    }

    /* ════════════════════════════════════════════════
       CURSOR & SCROLL PROGRESS
    ════════════════════════════════════════════════ */
    function CustomCursor() {
      const dotRef = useRef(null);
      const ringRef = useRef(null);
      useEffect(() => {
        const dot = dotRef.current;
        const ring = ringRef.current;
        if (!dot || !ring) return;
        document.body.classList.add("has-cursor");
        let mx = -300, my = -300, rx = -300, ry = -300, raf;
        const onMove = (e) => {
          mx = e.clientX; my = e.clientY;
          dot.style.transform = `translate3d(calc(${mx}px - 50%),calc(${my}px - 50%),0)`;
        };
        const tick = () => {
          rx += (mx - rx) * 0.11; ry += (my - ry) * 0.11;
          ring.style.transform = `translate3d(calc(${rx}px - 50%),calc(${ry}px - 50%),0)`;
          raf = requestAnimationFrame(tick);
        };
        raf = requestAnimationFrame(tick);
        const over = (e) => { if (e.target.closest("a,button,[role='button']")) ring.classList.add("is-hovering"); };
        const out = (e) => { if (!e.target.closest("a,button,[role='button']")) ring.classList.remove("is-hovering"); };
        document.addEventListener("mousemove", onMove);
        document.addEventListener("mouseover", over);
        document.addEventListener("mouseout", out);
        return () => {
          document.body.classList.remove("has-cursor");
          document.removeEventListener("mousemove", onMove);
          document.removeEventListener("mouseover", over);
          document.removeEventListener("mouseout", out);
          cancelAnimationFrame(raf);
        };
      }, []);
      return (
        <>
          <div className="cursor-dot" ref={dotRef} aria-hidden="true" />
          <div className="cursor-ring" ref={ringRef} aria-hidden="true" />
        </>
      );
    }

    function ScrollProgress() {
      const [progress, setProgress] = useState(0);
      useEffect(() => {
        const onScroll = () => {
          const scrollTop = window.scrollY;
          const docHeight = document.documentElement.scrollHeight - window.innerHeight;
          setProgress(docHeight > 0 ? (scrollTop / docHeight) * 100 : 0);
        };
        window.addEventListener("scroll", onScroll, { passive: true });
        return () => window.removeEventListener("scroll", onScroll);
      }, []);
      return <div className="scroll-progress" style={{ width: `${progress}%` }} aria-hidden="true" />;
    }

    /* ════════════════════════════════════════════════
       DRAGGABLE WINDOW
    ════════════════════════════════════════════════ */
    function DraggableWindow({ children, dragLabel }) {
      const [pos, setPos] = useState({ x: 0, y: 0 });
      const drag = useRef({ active: false, sx: 0, sy: 0, px: 0, py: 0 });

      const onDown = useCallback((e) => {
        e.preventDefault();
        drag.current = { active: true, sx: e.clientX, sy: e.clientY, px: pos.x, py: pos.y };
        const onMove = (ev) => {
          if (!drag.current.active) return;
          setPos({ x: drag.current.px + ev.clientX - drag.current.sx, y: drag.current.py + ev.clientY - drag.current.sy });
        };
        const onUp = () => {
          drag.current.active = false;
          window.removeEventListener("mousemove", onMove);
          window.removeEventListener("mouseup", onUp);
        };
        window.addEventListener("mousemove", onMove);
        window.addEventListener("mouseup", onUp);
      }, [pos.x, pos.y]);

      return (
        <div className="drag-win" style={{ transform: `translate(${pos.x}px,${pos.y}px)` }}>
          <div className="drag-win-bar" onMouseDown={onDown}>
            <span className="wd wd-r" /><span className="wd wd-y" /><span className="wd wd-g" />
            <div className="win-drag-label">{dragLabel}</div>
          </div>
          <div className="drag-win-body">{children}</div>
        </div>
      );
    }

        { left: "46%", top: "82%", size: 76, gap: 15 },
        { left: "70%", top: "76%", size: 68, gap: 14 },
      ]), []);

      useEffect(() => {
        const onMove = (e) => {
          pupilRefs.current.forEach((pupil) => {
            if (!pupil) return;
            const eye = pupil.parentElement;
            const rect = eye.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            const dx = e.clientX - cx;
            const dy = e.clientY - cy;
            const angle = Math.atan2(dy, dx);
            const distance = Math.min(13, Math.hypot(dx, dy) / 18);
            const x = Math.cos(angle) * distance;
            const y = Math.sin(angle) * distance;
            pupil.style.transform = `translate(${x}px, ${y}px)`;
          });
        };

        window.addEventListener("mousemove", onMove, { passive: true });
        return () => window.removeEventListener("mousemove", onMove);
      }, []);

      let refIdx = 0;
      return (
        <div className="skills-eyes-bg" aria-hidden="true">
          {pairs.map((pair, pi) => (
            <div
              key={pi}
              className="skills-eye-pair"
              style={{ left: pair.left, top: pair.top, gap: pair.gap }}
            >
              {[0, 1].map((ei) => {
                const idx = refIdx++;
                return (
                  <div
                    key={ei}
                    className="skills-eye"
                    style={{ width: pair.size, height: Math.round(pair.size * 0.78) }}
                  >
                    <div
                      className="skills-pupil"
                      ref={(el) => { pupilRefs.current[idx] = el; }}
                    />
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      );
    }

    /* ════════════════════════════════════════════════
       SECTION TITLE
    ════════════════════════════════════════════════ */
    function SectionTitle({ title, text, light }) {
      const ref = useRef(null);
      const chars = useMemo(() => Array.from(title || ""), [title]);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(entries => {
          entries.forEach(entry => { if (entry.isIntersecting) el.classList.add("visible"); });
        }, { threshold: 0.3 });
        obs.observe(el);
        return () => obs.disconnect();
      }, []);
      return (
        <div className={`sec-title reveal${light ? " sec-title-light" : ""}`} ref={ref}>
          <h2 aria-label={title}>
            <span className="title-domino" aria-hidden="true">
              {chars.map((ch, i) => (
                <span
                  key={`${ch}-${i}`}
                  className={ch === " " ? "title-domino-space" : "title-domino-letter"}
                  style={{ "--i": i }}
                >
                  {ch === " " ? "\u00A0" : ch}
                </span>
              ))}
            </span>
          </h2>
          {text && <p>{text}</p>}
        </div>
      );
    }

    /* ════════════════════════════════════════════════
       PROJECT PREVIEW MODAL
    ════════════════════════════════════════════════ */
    function ProjectPreviewModal({ project, labels, onClose }) {
      const [fullscreenOpen, setFullscreenOpen] = useState(false);
      useEffect(() => {
        if (!project) return;
        const prev = document.body.style.overflow;
        document.body.style.overflow = "hidden";
        const onKeyDown = (e) => {
          if (e.key !== "Escape") return;
          if (fullscreenOpen) { setFullscreenOpen(false); return; }
          onClose();
        };
        window.addEventListener("keydown", onKeyDown);
        return () => { document.body.style.overflow = prev; window.removeEventListener("keydown", onKeyDown); };
      }, [fullscreenOpen, project, onClose]);
      if (!project) return null;
      return ReactDOM.createPortal(
        <>
          <div className="project-preview-overlay" onClick={onClose}>
            <div className="project-preview-modal" onClick={e => e.stopPropagation()} role="dialog" aria-modal="true">
              <button
                type="button"
                className={"project-preview-image project-preview-image-button" + (project.localImage ? "" : " bc-preview-" + project.cover)}
                style={project.localImage ? { backgroundImage: `url('${project.localImage}')` } : undefined}
                onClick={() => setFullscreenOpen(true)}
                aria-label={`Ouvrir l'image pour ${project.title}`}
              />
              <div className="project-preview-details">
                <div className="project-preview-head">
                  <p className="service-title">{labels.previewTitle}</p>
                  <button type="button" className="project-preview-close" onClick={onClose}>{labels.close}</button>

                <p className="service-title">{labels.detailsTitle}</p>
                <div className="meta">{project.tags.map(tag => <span className="chip" key={tag}>{tag}</span>)}</div>
                <div className="project-links">
                  {project.links.demo
                    ? <a href={project.links.demo} target="_blank" rel="noreferrer" className="project-link"><span className="platform-icon"><IconExternal /></span>{labels.demo}</a>
                    : <span className="project-link"><span className="platform-icon"><IconExternal /></span>{labels.demoSoon}</span>}

    function Veille({ t, lang }) {
      const refs = useReveal();
      const [items, setItems] = useState([]);
      const [loading, setLoading] = useState(true);
      const [feedLang, setFeedLang] = useState(lang);
      useEffect(() => { setFeedLang(lang); }, [lang]);
      const formatDate = (epoch) => {
        if (!epoch) return feedLang === "fr" ? "Date inconnue" : "Unknown date";
        return new Date(epoch * 1000).toLocaleDateString(feedLang === "fr" ? "fr-FR" : "en-US");
      };
      useEffect(() => {
        let active = true;
        const load = async () => {
          if (active) setLoading(true);
          try {
            let fresh = feedLang === "fr" ? await fetchFrenchTechWatch() : await fetchEnglishTechWatch();

            if (!active) return;
            setItems(fresh);

          finally { if (active) setLoading(false); }
        };
        load();
        const timer = window.setInterval(load, 15 * 60 * 1000);
        return () => { active = false; window.clearInterval(timer); };
      }, [feedLang]);

            </div>
          </div>
        </section>
      );
    }

    /* ════════════════════════════════════════════════
       DISCORD PRESENCE
    ════════════════════════════════════════════════ */
    function DiscordPresence() {
      const DISCORD_USER_ID = "540915499698225162";
      const [state, setState] = useState({ loading: true, ok: false, username: "Discord", rawUsername: "", avatar: "", banner: "", status: "offline", customStatus: "", activityName: "", activityDetails: "", activityState: "" });
      useEffect(() => {
        if (!DISCORD_USER_ID) { setState(s => ({ ...s, loading: false, ok: false })); return; }
        let active = true;
        const load = async () => {
          try {
            const url = "https://api.lanyard.rest/v1/users/" + DISCORD_USER_ID;
            const res = await fetch(url).then(r => r.json());
            if (!active || !res?.success || !res?.data) return;
            const data = res.data;
            const user = data.discord_user || {};
            const avatar = user.avatar ? "https://cdn.discordapp.com/avatars/" + user.id + "/" + user.avatar + ".png?size=128" : "";
            const banner = user.banner ? "https://cdn.discordapp.com/banners/" + user.id + "/" + user.banner + (user.banner.startsWith("a_") ? ".gif?size=480" : ".png?size=480") : "";
            const activities = Array.isArray(data.activities) ? data.activities : [];
            const custom = activities.find(a => a.type === 4);
            const main = activities.find(a => a.type === 0);
            const statusText = (custom?.emoji?.name ? custom.emoji.name + " " : "") + (custom?.state || "");
            setState({ loading: false, ok: true, username: user.username ? user.username + (user.discriminator && user.discriminator !== "0" ? "#" + user.discriminator : "") : "Discord", rawUsername: user.username || "", avatar, banner, status: data.discord_status || "offline", customStatus: statusText.trim(), activityName: main?.name || "", activityDetails: main?.details || "", activityState: main?.state || "" });
          } catch (e) { if (!active) return; setState(prev => ({ ...prev, loading: false, ok: false })); }
        };
        load();
        const timer = window.setInterval(load, 30000);
        return () => { active = false; window.clearInterval(timer); };
      }, []);
      return (
        <section className="section-purple discord-wrap">
          <div className="container">
            <article className="discord-card">
              <div className="discord-banner" style={state.banner ? { backgroundImage: "url('" + state.banner + "')", backgroundSize: "cover", backgroundPosition: "center" } : undefined} />
              <div className="discord-profile">
                <div className="discord-live-badge">Discord Live</div>
                <div className="discord-head">
                  <div className="discord-avatar-wrap">
                    {state.avatar ? <img src={state.avatar} alt="Discord avatar" className="discord-avatar" /> : <div className="discord-avatar" />}
                    <span className={"discord-status-dot discord-status-" + state.status} />
                  </div>
                  <div>
                    <div className="discord-name">{state.rawUsername || state.username}</div>
                    <div className="discord-id-line">{state.username}</div>
                  </div>
                </div>
                <div className={"discord-status-pill " + state.status}>{state.status}</div>
                {state.customStatus && <div className="discord-bubble">{state.customStatus}</div>}
                {(state.activityName || state.activityDetails || state.activityState) && (
                  <div className="discord-activity">
                    <div className="discord-activity-title">{state.activityName || "Activity"}</div>
                    {state.activityDetails && <div className="discord-activity-sub">{state.activityDetails}</div>}
                    {state.activityState && <div className="discord-activity-sub">{state.activityState}</div>}
                  </div>
                )}
                {DISCORD_USER_ID && !state.loading && !state.ok && <div className="discord-note">Impossible de charger le profil pour le moment.</div>}
              </div>
            </article>
          </div>
        </section>
      );
    }

    /* ════════════════════════════════════════════════
       SONIC EASTER EGG
    ════════════════════════════════════════════════ */
    function SonicEaster({ lang, open, onClose }) {
      if (!open) return null;
      const text = lang === "fr"
        ? { title: "Easter egg Sonic débloqué", collect: "Sonic CD - joue directement ici", close: "Fermer" }
        : { title: "Sonic easter egg unlocked", collect: "Sonic CD - play directly here", close: "Close" };
      return (
        <div className="sonic-easter">
          <div className="sonic-easter-head">
            <strong>{text.title}</strong>
            <button className="sonic-close" onClick={onClose}>{text.close}</button>
          </div>
          <div className="ring-row"><span>{text.collect}</span></div>
          <div>
            <iframe className="sonic-frame" src="https://www.retrogames.cc/embed/40754-sonic-cd.html" width="600" height="450" frameBorder="no" allowFullScreen webkitAllowFullScreen mozAllowFullScreen scrolling="no" title="Sonic CD" />
          </div>
        </div>
      );
    }

    /* ════════════════════════════════════════════════
       FOOTER
    ════════════════════════════════════════════════ */
    function Footer({ t }) {
      return (
        <footer className="site-footer">
          <div>{t.contactFoot}</div>
          <div className="footer-legal-links">
            <a href="./mentions-legales.html">Mentions légales</a>
            <a href="./confidentialite.html">Confidentialité</a>
            <a href="./cookies.html">Cookies</a>
          </div>
        </footer>
      );
    }

    function StorageNotice({ t }) {
      const [visible, setVisible] = useState(() => {
        try {
          return window.localStorage.getItem("storage_notice_seen") !== "1";
        } catch {
          return true;
        }
      });

      if (!visible) return null;

      const close = () => {
        setVisible(false);
        try { window.localStorage.setItem("storage_notice_seen", "1"); } catch {}
      };

      return (
        <aside className="storage-notice" role="status" aria-live="polite">
          <p>{t.storageNoticeText}</p>
          <div className="storage-notice-actions">
            <a href="./cookies.html">{t.storageNoticePolicy}</a>
            <button type="button" onClick={close}>{t.storageNoticeBtn}</button>
          </div>
        </aside>
      );
    }

    /* ════════════════════════════════════════════════
       APP
    ════════════════════════════════════════════════ */
    function App() {
      const [lang, setLang] = useState("fr");
      const [sonicOpen, setSonicOpen] = useState(false);
      const [dysMode, setDysMode] = useState(() => {
        try {
          return window.localStorage.getItem("dysMode") === "1";
        } catch {
          return false;
        }
      });
      const t = useMemo(() => translations[lang], [lang]);

      useEffect(() => { document.documentElement.lang = lang; }, [lang]);
      useEffect(() => {
        document.body.classList.toggle("dys-mode", dysMode);
        try {
          window.localStorage.setItem("dysMode", dysMode ? "1" : "0");
        } catch {}
        return () => document.body.classList.remove("dys-mode");
      }, [dysMode]);

      useEffect(() => {
        const sequence = ["up", "up", "down", "down", "left", "right", "left", "right", "b", "a"];
        let index = 0, lastTs = 0;
        const normalizeKey = (raw) => {
          const key = String(raw || "").toLowerCase();
          if (key === "arrowup" || key === "w" || key === "z") return "up";
          if (key === "arrowdown" || key === "s") return "down";
          if (key === "arrowleft" || key === "q") return "left";
          if (key === "arrowright" || key === "d") return "right";
          return key;
        };
        const onKey = (e) => {
          const now = Date.now();
          if (now - lastTs > 3500) index = 0;
          lastTs = now;
          const key = normalizeKey(e.key);
          if (key === sequence[index]) {
            index += 1;
            if (index === sequence.length) { setSonicOpen(true); index = 0; }
          } else { index = key === sequence[0] ? 1 : 0; }
        };
        window.addEventListener("keydown", onKey);
        return () => window.removeEventListener("keydown", onKey);
      }, []);

      return (
        <>
          <CustomCursor />
          <ScrollProgress />
          <SonicEaster lang={lang} open={sonicOpen} onClose={() => setSonicOpen(false)} />
          <Nav t={t} lang={lang} setLang={setLang} dysMode={dysMode} setDysMode={setDysMode} />
          <Hero t={t} lang={lang} />
          <Marquee />
          <About t={t} />
          <Goal t={t} />
          <Projects t={t} lang={lang} />
          <Services t={t} />
          <Skills t={t} />
          <FavoriteTech t={t} />
          <Journey t={t} />
          <VeilleFront t={t} lang={lang} />
          <WatchTools t={t} />
          <Contact t={t} />
          <DiscordPresence />
          <Footer t={t} />
          <StorageNotice t={t} />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
